<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ app_name }}</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🏖️ OOO Consolidator</h1>
            <p class="subtitle">Set your out-of-office status everywhere, all at once</p>
        </header>

        <div class="status-indicator" id="statusIndicator"></div>

        <main>
            <form id="oooForm" class="ooo-form">
                <div class="form-section">
                    <h2>Leave Dates</h2>
                    <div class="form-group">
                        <label for="startDate">Start Date & Time</label>
                        <input type="datetime-local" id="startDate" name="start_date" required>
                    </div>
                    <div class="form-group">
                        <label for="endDate">End Date & Time</label>
                        <input type="datetime-local" id="endDate" name="end_date" required>
                    </div>
                </div>

                <div class="form-section">
                    <h2>OOO Message</h2>
                    <div class="form-group">
                        <label for="message">Message <span class="required">*</span></label>
                        <textarea
                            id="message"
                            name="message"
                            rows="3"
                            placeholder="e.g., On vacation in Hawaii 🌴"
                            required
                            maxlength="500"
                        ></textarea>
                        <small class="help-text">This will appear in Slack, calendar, and email</small>
                    </div>

                    <div class="form-group">
                        <label for="reason">Reason (Optional)</label>
                        <input
                            type="text"
                            id="reason"
                            name="reason"
                            placeholder="e.g., Annual vacation"
                            maxlength="200"
                        >
                    </div>

                    <div class="form-group">
                        <label for="emergencyContact">Emergency Contact (Optional)</label>
                        <textarea
                            id="emergencyContact"
                            name="emergency_contact"
                            rows="2"
                            placeholder="e.g., Contact Jane Doe at jane@company.com for urgent matters"
                            maxlength="300"
                        ></textarea>
                    </div>
                </div>

                <div class="form-section">
                    <h2>Update Platforms</h2>
                    <div class="checkbox-group">
                        <label class="checkbox-label">
                            <input type="checkbox" name="enable_slack" checked>
                            <span class="checkbox-text">
                                <strong>Slack Status</strong>
                                <small>Update your Slack status with OOO message</small>
                            </span>
                        </label>

                        <label class="checkbox-label">
                            <input type="checkbox" name="enable_calendar" checked>
                            <span class="checkbox-text">
                                <strong>Google Calendar</strong>
                                <small>Create out-of-office calendar event</small>
                            </span>
                        </label>

                        <label class="checkbox-label">
                            <input type="checkbox" name="enable_email_signature" checked>
                            <span class="checkbox-text">
                                <strong>Email Signature</strong>
                                <small>Add OOO notice to your email signature</small>
                            </span>
                        </label>

                        <label class="checkbox-label">
                            <input type="checkbox" name="enable_email_autoreply" checked>
                            <span class="checkbox-text">
                                <strong>Email Auto-Reply</strong>
                                <small>Enable Gmail vacation responder</small>
                            </span>
                        </label>
                    </div>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary" id="submitBtn">
                        Set Out of Office
                    </button>
                    <button type="button" class="btn btn-secondary" id="clearBtn">
                        Clear OOO (I'm Back!)
                    </button>
                </div>
            </form>

            <div id="resultMessage" class="result-message"></div>
        </main>

        <footer>
            <p>OOO Consolidator v0.1.0 | <a href="/docs">API Docs</a></p>
        </footer>
    </div>

    <script src="/static/js/app.js"></script>
</body>
</html>
